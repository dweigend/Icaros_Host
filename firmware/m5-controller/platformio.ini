; Purpose: PlatformIO build definition for the minimal Icaros M5 controller
; firmware. This project is intentionally local to the Host repo and only builds
; firmware when a human explicitly runs PlatformIO.

[env:m5stick-c-plus2]
platform = espressif32@6.7.0
board = m5stick-c
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=2
lib_deps =
    m5stack/M5Unified
    links2004/WebSockets
    bblanchon/ArduinoJson
